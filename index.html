<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>信泰工艺PDM</title>
<style>
/* ===== DESIGN SYSTEM: Apple Dark, Simplified ===== */
:root {
  --bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--surface3:#3a3a3c;
  --sep:rgba(84,84,88,0.6);--sep2:rgba(84,84,88,0.3);
  --fill:rgba(120,120,128,0.16);
  --t1:rgba(255,255,255,0.92);--t2:rgba(235,235,245,0.6);--t3:rgba(235,235,245,0.3);--t4:rgba(235,235,245,0.18);
  --accent:#FF9F0A;--accent2:rgba(255,159,10,0.15);
  --blue:#0A84FF;--green:#30D158;--red:#FF453A;--teal:#64D2FF;--purple:#BF5AF2;
  --mono:'SF Mono','Cascadia Code','Consolas',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  --r:12px;--ease:cubic-bezier(0.16,1,0.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}

/* KEY FIX: Allow page to scroll naturally on mobile */
html{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;letter-spacing:-0.01em;min-height:100vh}

/* ===== HEADER ===== */
#header{
  position:sticky;top:0;z-index:100;
  height:52px;background:rgba(28,28,30,0.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:0.5px solid var(--sep);display:flex;align-items:center;padding:0 20px;gap:12px;
}
.logo{font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px}
.logo-d{width:20px;height:20px;background:var(--accent);border-radius:4px;transform:rotate(45deg);box-shadow:0 0 12px rgba(255,159,10,0.3)}
.badge{font-size:11px;font-weight:500;color:var(--accent);background:var(--accent2);padding:3px 10px;border-radius:20px}
.header-right{margin-left:auto;display:flex;gap:16px;font-size:13px;color:var(--t2)}
.header-right b{color:var(--t1);font-weight:600}

/* ===== MAIN LAYOUT ===== */
#main{display:flex;min-height:calc(100vh - 52px)}

/* ===== SIDEBAR ===== */
#sidebar{
  width:240px;background:rgba(28,28,30,0.55);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-right:0.5px solid var(--sep2);overflow-y:auto;padding:16px 10px;flex-shrink:0;
  position:sticky;top:52px;height:calc(100vh - 52px);
}
#sidebar::-webkit-scrollbar{width:0}
.slabel{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--t3);padding:12px 8px 6px}
.nav{
  display:flex;align-items:center;padding:8px 12px;border-radius:8px;cursor:pointer;
  font-size:14px;font-weight:450;color:var(--t2);gap:8px;transition:all 0.2s var(--ease);user-select:none;margin-bottom:1px;
}
.nav:hover{background:var(--fill);color:var(--t1)}
.nav.on{background:var(--accent2);color:var(--accent)}
.nav .cnt{margin-left:auto;font-size:12px;color:var(--t3);background:rgba(118,118,128,0.12);padding:2px 8px;border-radius:10px;font-variant-numeric:tabular-nums}
.nav.on .cnt{background:rgba(255,159,10,0.25);color:var(--accent)}
.nav.sub{padding-left:36px;font-size:13px}

/* Progress bar */
.progress-box{margin-top:20px;padding:14px;background:var(--fill);border-radius:var(--r);border:0.5px solid var(--sep2)}
.progress-box h4{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:10px}
.progress-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s var(--ease)}
.progress-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--t3)}
.pdot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}

/* ===== CONTENT AREA ===== */
#content{flex:1;display:flex;flex-direction:column;min-width:0}

/* Toolbar */
#toolbar{padding:12px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0;border-bottom:0.5px solid var(--sep2);background:rgba(0,0,0,0.3);flex-wrap:wrap}
#search{flex:1;min-width:200px;max-width:360px;background:var(--fill);border:0.5px solid var(--sep);border-radius:8px;padding:8px 14px;color:var(--t1);font-size:14px;outline:none;font-family:var(--sans);transition:all 0.2s var(--ease)}
#search:focus{border-color:var(--accent);background:rgba(118,118,128,0.12)}
#search::placeholder{color:var(--t3)}
.chip{
  padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;
  border:0.5px solid var(--sep);background:var(--fill);color:var(--t2);transition:all 0.2s var(--ease);white-space:nowrap;
}
.chip:hover{background:rgba(118,118,128,0.12);color:var(--t1)}
.chip.on{background:var(--accent2);border-color:var(--accent);color:var(--accent)}
#rcount{margin-left:auto;font-size:13px;color:var(--t3);font-variant-numeric:tabular-nums}

/* Craft list - KEY FIX: proper scroll */
#clist{flex:1;overflow-y:auto;padding:8px 16px;position:relative}
#clist::-webkit-scrollbar{width:4px}
#clist::-webkit-scrollbar-thumb{background:var(--sep);border-radius:2px}

.crow{
  display:flex;align-items:center;padding:12px 16px;border-radius:var(--r);cursor:pointer;
  gap:12px;transition:all 0.2s var(--ease);border:0.5px solid transparent;margin-bottom:2px;position:relative;
}
.crow:hover{background:var(--fill)}
.crow.sel{background:rgba(118,118,128,0.12);border-color:var(--sep)}
.crow .cid{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--accent);min-width:160px;letter-spacing:0.03em}
.crow .cname{font-size:14px;font-weight:550;color:var(--t1);min-width:100px}
.crow .tag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;background:var(--fill);color:var(--t2)}
.crow .tag.fz{color:var(--teal)}.crow .tag.wb{color:var(--green)}
.crow .dprev{flex:1;font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.crow .pdot2{width:6px;height:6px;border-radius:50%;background:var(--green);position:absolute;left:5px;top:50%;transform:translateY(-50%);box-shadow:0 0 6px rgba(48,209,88,0.4)}

/* ===== DETAIL PANEL - KEY FIX: scrollable, proper height ===== */
#detail{
  width:420px;background:var(--surface);border-left:0.5px solid var(--sep);
  overflow-y:auto;flex-shrink:0;
  position:sticky;top:52px;height:calc(100vh - 52px);
}
#detail::-webkit-scrollbar{width:4px}
#detail::-webkit-scrollbar-thumb{background:var(--sep);border-radius:2px}
.dempty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t3);font-size:14px}

/* Detail header */
.dhead{padding:20px 16px 16px;border-bottom:0.5px solid var(--sep);background:rgba(0,0,0,0.2)}
.dhead .cid2{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--accent);letter-spacing:0.04em;margin-bottom:4px}
.dhead .nm2{font-size:22px;font-weight:700;letter-spacing:-0.02em;line-height:1.2}
.dhead .meta{margin-top:10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* Detail body - scrolls inside the sticky panel */
.dbody{padding:16px;padding-bottom:40px}

/* Field groups */
.fg{margin-bottom:20px}
.fg h4{
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--t3);
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.fg h4::after{content:'';flex:1;height:0.5px;background:var(--sep2)}
.fr{display:flex;padding:5px 0;font-size:13px;align-items:baseline;gap:8px}
.fl{color:var(--t2);min-width:80px;flex-shrink:0;font-weight:450;font-size:12px}
.fv{color:var(--t1);font-weight:450;line-height:1.5;flex:1;min-width:0;word-break:break-word}
.fv.ok{color:var(--t1)}
.fv.no{color:var(--t4);font-style:italic;font-size:12px}

/* Definition block */
.defblk{background:rgba(0,0,0,0.3);padding:12px;border-radius:var(--r);border:0.5px solid var(--sep2);margin-bottom:20px}
.defblk h4{margin-bottom:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--t3)}
.deftxt{font-size:13px;color:var(--t2);line-height:1.8}

/* Completion indicator for field groups */
.comp-indicator{
  font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;margin-left:auto;flex-shrink:0;
}
.comp-full{background:rgba(48,209,88,0.15);color:var(--green)}
.comp-partial{background:rgba(255,159,10,0.15);color:var(--accent)}
.comp-empty{background:rgba(255,69,58,0.15);color:var(--red)}

/* ===== MOBILE RESPONSIVE ===== */
@media(max-width:1100px){
  #detail{width:360px}
}
@media(max-width:900px){
  #sidebar{display:none}
  #detail{
    position:fixed;right:0;top:52px;bottom:0;z-index:150;width:100%;max-width:420px;
    transform:translateX(100%);transition:transform 0.3s var(--ease);
  }
  #detail.open{transform:translateX(0)}
  .mob-back{
    display:inline-flex !important;align-items:center;gap:6px;
    padding:6px 12px;border-radius:8px;background:var(--fill);color:var(--t2);
    border:none;cursor:pointer;font-size:13px;font-family:var(--sans);margin-bottom:12px;
  }
}
@media(min-width:901px){
  .mob-back{display:none !important}
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.crow{animation:fadeIn 0.25s var(--ease) both}
</style>
</head>

    ['render_prompt','AI生图Prompt']
  ]
};

let activeFilter = 'all';
let selCraft = null;

function getFiltered() {
  let f = CRAFTS;
  if (activeFilter === 'FZ') f = CRAFTS.filter(c => c.category_code === 'FZ');
  else if (activeFilter === 'WB') f = CRAFTS.filter(c => c.category_code === 'WB');
  else if (activeFilter === '14H') f = CRAFTS.filter(c => c.needle_or_machine && c.needle_or_machine.includes('14针') && c.category_code === 'FZ');
  else if (activeFilter === '18HJ') f = CRAFTS.filter(c => c.needle_or_machine && c.needle_or_machine.includes('18针') && c.category_code === 'FZ');
  else if (activeFilter === 'XY14') f = CRAFTS.filter(c => c.machine_model === '14针' && c.category_code === 'WB');
  else if (activeFilter === 'DY') f = CRAFTS.filter(c => c.needle_or_machine === '大圆机');
  else if (activeFilter === 'PT') f = CRAFTS.filter(c => c.needle_or_machine === '普通机');

  const q = document.getElementById('search').value.toLowerCase();
  if (q) {
    f = f.filter(c =>
      c.craft_id.toLowerCase().includes(q) ||
      c.craft_name.includes(q) ||
      (c.definition && c.definition.includes(q)) ||
      (c.needle_or_machine && c.needle_or_machine.includes(q))
    );
  }
  return f;
}

function renderList() {
  const f = getFiltered();
  document.getElementById('rcount').textContent = f.length + ' 条';

  const el = document.getElementById('clist');
  el.innerHTML = f.map((c, i) => {
    const isFZ = c.category_code === 'FZ';
    const dp = c.definition && c.definition.length > 40 ? c.definition.substring(0,40)+'…' : (c.definition || '');
    const sc = selCraft && selCraft.craft_id === c.craft_id ? ' sel' : '';
    const pd = c._prefilled ? '<span class="pdot2"></span>' : '';
    return '<div class="crow'+sc+'" onclick="sel(\''+c.craft_id+'\')" data-id="'+c.craft_id+'" style="animation-delay:'+i*0.01+'s">'+
      pd+'<span class="cid">'+c.craft_id+'</span><span class="cname">'+c.craft_name+'</span>'+
      '<span class="tag '+(isFZ?'fz':'wb')+'">'+c.category+'</span><span class="dprev">'+dp+'</span></div>';
  }).join('');
}

function sel(id) {
  const c = CRAFTS.find(x => x.craft_id === id);
  if (!c) return;
  selCraft = c;
  document.querySelectorAll('.crow').forEach(el => el.classList.toggle('sel', el.dataset.id === id));
  renderDetail(c);
  // Mobile: open detail panel
  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  selCraft = null;
  document.getElementById('detail').classList.remove('open');
  document.getElementById('detail').innerHTML = '<div class="dempty">← 选择工艺查看详情</div>';
  renderList();
}

function renderDetail(c) {
  const p = document.getElementById('detail');
  const isFZ = c.category_code === 'FZ';
  const sub = isFZ ? c.needle_or_machine : c.needle_or_machine + (c.machine_model ? ' · ' + c.machine_model : '');

  function rf(fields, title) {
    // Count filled vs total
    let filled = 0, total = fields.length;
    for (const [key] of fields) {
      if (c[key] && c[key].toString().trim()) filled++;
    }
    let compClass = filled === 0 ? 'comp-empty' : (filled < total ? 'comp-partial' : 'comp-full');
    let compText = filled + '/' + total;

    let h = '<div class="fg"><h4>'+title+'<span class="comp-indicator '+compClass+'">'+compText+'</span></h4>';
    for (const [key, label] of fields) {
      let v = c[key] || '';
      if (v && v.toString().trim()) {
        if (key === 'status' && v === 'active') v = '● 活跃';
        h += '<div class="fr"><span class="fl">'+label+'</span><span class="fv ok">'+v+'</span></div>';
      } else {
        h += '<div class="fr"><span class="fl">'+label+'</span><span class="fv no">— 待补充</span></div>';
      }
    }
    h += '</div>';
    return h;
  }

  p.innerHTML =
    '<button class="mob-back" onclick="closeDetail()">← 返回列表</button>' +
    '<div class="dhead"><div class="cid2">'+c.craft_id+'</div><div class="nm2">'+c.craft_name+'</div>'+
    '<div class="meta"><span class="tag '+(isFZ?'fz':'wb')+'">'+c.category+'</span>'+
    '<span style="font-size:13px;color:var(--t2)">'+sub+'</span>'+
    '<span style="font-size:12px;color:var(--t3);margin-left:auto">v'+c.version+'</span>'+
    (c._prefilled ? '<span style="font-size:11px;color:var(--green);background:rgba(48,209,88,0.1);padding:2px 8px;border-radius:10px">✓ 示例</span>' : '')+
    '</div></div><div class="dbody">'+
    rf(FIELDS.L1, '基础标识')+
    rf(FIELDS.L2, '技术参数')+
    rf(FIELDS.L3, '应用与资产')+
    '<div class="defblk"><h4>📖 工艺定义</h4><div class="deftxt">'+(c.definition||'')+'</div></div></div>';
}

// Navigation
document.querySelectorAll('#sidebar .nav[data-f], .chip[data-f]').forEach(el => {
  el.addEventListener('click', function() {
    const f = this.dataset.f;
    activeFilter = (f === 'all') ? 'all' : (activeFilter === f ? 'all' : f);
    document.querySelectorAll('#sidebar .nav').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('#sidebar .nav[data-f="'+activeFilter+'"]').forEach(t => t.classList.add('on'));
    if (activeFilter === 'all') document.querySelector('#sidebar .nav[data-f="all"]').classList.add('on');
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c.dataset.f === activeFilter || (activeFilter === 'all' && c.dataset.f === 'all')));
    renderList();
  });
});

document.getElementById('search').addEventListener('input', renderList);

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDetail();
});

// Initial render
renderList();
if (CRAFTS.length > 0) {
  const first = CRAFTS.find(c => c._prefilled) || CRAFTS[0];
  setTimeout(() => sel(first.craft_id), 100);
}
</script>
</body>
</html>
